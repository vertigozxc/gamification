services:
  - type: web
    name: life-rpg-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install; npm run prisma:generate; npm run prisma:deploy
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: CLIENT_ORIGIN
        value: https://life-rpg-client.onrender.com
    disk:
      name: life-rpg-sqlite
      mountPath: /var/data
      sizeGB: 1

  - type: static
    name: life-rpg-client
    rootDir: client
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://life-rpg-api.onrender.com
