services:
  - type: web
    name: life-rpg-api-us
    region: oregon
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install; npm run prisma:generate
    startCommand: npm run prisma:deploy; npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        value: https://life-rpg-client.onrender.com

  - type: web
    name: life-rpg-api-eu
    region: frankfurt
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install; npm run prisma:generate
    startCommand: npm run prisma:deploy; npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        value: https://life-rpg-client.onrender.com

  - type: web
    runtime: static
    name: life-rpg-client
    rootDir: client
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.life-rpg.app
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyBpG0jinIwaHgF2h1oOA45xyG0bs0kOSos
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: life-rpg-83c0a.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: life-rpg-83c0a
      - key: VITE_FIREBASE_APP_ID
        value: 1:381152713640:web:4afcec9538a39acf0d1b9d
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
